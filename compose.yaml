services:
  nginx:
    container_name: nginx
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./api:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
    networks:
      - app-network

  api:
    container_name: api
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      APP_ENV: local
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-devforge}
      DB_USERNAME: ${DB_USERNAME:-devforge}
      DB_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - ./api:/var/www/html
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./front:/app
    networks:
      - app-network

  mysql:
    container_name: mysql
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-devforge}
      MYSQL_USER: ${DB_USERNAME:-devforge}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
